<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ブログ編集・削除</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <h1>ブログ編集・削除</h1>

    <form action="#" method="post" class="form-box">
      <label>タイトル</label>
      <input type="text" name="title" value="サンプルタイトル">

      <label>本文</label>
      <textarea name="content" rows="8">サンプル本文です。</textarea>

      <button type="submit">更新</button>
      <button type="button" class="delete-btn">削除</button>
    </form>

    <p><a href=" ">ブログ一覧へ</a ></p >
  </div>
</body>
</html>
