<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ブログ登録</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <h1>ブログ登録</h1>

    <form action="#" method="post" class="form-box">
      <label>タイトル</label>
      <input type="text" name="title" placeholder="タイトルを入力">

      <label>本文</label>
      <textarea name="content" rows="8" placeholder="本文を入力"></textarea>

      <button type="submit">登録</button>
    </form>

    <p><a href=" ">ブログ一覧へ</a ></p >
  </div>
</body>
</html>
