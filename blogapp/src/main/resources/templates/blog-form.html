<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ブログ登録</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>

<h1>ブログ登録</h1>

<form th:action="@{/blog/save}" method="post" th:object="${blog}">

    タイトル：<br>
    <input type="text" th:field="*{title}"><br><br>

    内容：<br>
    <textarea th:field="*{content}"></textarea><br><br>

    <button type="submit">登録</button>

</form>

</body>
</html>
