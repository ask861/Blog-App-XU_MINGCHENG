<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ブログ一覧</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>

<h1>ブログ一覧</h1>

<table border="1">

<tr>
    <th>ID</th>
    <th>タイトル</th>
    <th>内容</th>
</tr>

<tr th:each="blog : ${blogList}">
    <td th:text="${blog.id}"></td>
    <td th:text="${blog.title}"></td>
    <td th:text="${blog.content}"></td>
</tr>

</table>

</body>
</html>
